<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart | Shoes</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="navbar">
    <div class="logo">SneakerShop</div>

    <div class="navbar-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </div>

    <ul class="navbar-menu">
        <li class="navbar-item"><a href="/" class="navbar-links">Home</a></li>
        <li class="navbar-item"><a href="Products.html" class="navbar-links">Products</a></li>
        <li class="navbar-item"><a href="Product-Details.html" class="navbar-links">Product Details</a></li>
        <li class="navbar-item"><a href="Cart.html" class="navbar-links">Cart</a></li>
        <li class="navbar-item"><a href="Feedback.html" class="navbar-links">Feedback</a></li>
        <li class="navbar-btn"><a href="/" class="button">Sign Up</a></li>

        <li class="navbar-item cart-icon">
            🛒 Cart (<span id="cart-count">0</span>)
        </li>
    </ul>
</header>

<main class="cart-page">
    <h1>Your Shopping Cart</h1>

    <div class="cart-items" id="cart-items">
        <!-- Cart items will be loaded here by JavaScript -->
    </div>

    <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
            <span>Subtotal:</span>
            <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
            <span>Shipping:</span>
            <span id="shipping">$10.00</span>
        </div>
        <div class="summary-row total">
            <span>Total:</span>
            <span id="total">$0.00</span>
        </div>
        <a href="checkout.html" class="btn checkout-btn">Proceed to Checkout</a>
    </div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const cartItemsContainer = document.getElementById("cart-items");
        const subtotalElement = document.getElementById("subtotal");
        const shippingElement = document.getElementById("shipping");
        const totalElement = document.getElementById("total");
        const cartCountElement = document.getElementById("cart-count");
    
        let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
    
        if (cartItems.length === 0) {
            cartItemsContainer.innerHTML = `<p>Your cart is empty.</p>`;
            return;
        }
    
        let subtotal = 0;
        cartItems.forEach(item => {
            const itemDiv = document.createElement("div");
            itemDiv.classList.add("cart-item");
            itemDiv.innerHTML = `
                <p><strong>${item.name}</strong> (Size: ${item.size})</p>
                <p>Price: $${item.price.toFixed(2)}</p>
                <p>Quantity: ${item.quantity}</p>
                <p>Total: $${(item.price * item.quantity).toFixed(2)}</p>
            `;
            cartItemsContainer.appendChild(itemDiv);
            
            // Calculate subtotal
            subtotal += item.price * item.quantity;
        });
    
        // Update subtotal, shipping, and total
        const shipping = 10.00; // Fixed shipping fee
        const total = subtotal + shipping;
    
        subtotalElement.textContent = `$${subtotal.toFixed(2)}`;
        shippingElement.textContent = `$${shipping.toFixed(2)}`;
        totalElement.textContent = `$${total.toFixed(2)}`;
    
        // Update the cart count in the navbar
        cartCountElement.textContent = cartItems.length;
    });
    </script>
